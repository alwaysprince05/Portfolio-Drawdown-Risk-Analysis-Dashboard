<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio Drawdown and Risk Analysis Dashboard - An interactive financial tool to analyze downside risk and rolling maximums.">
    <title>Portfolio Drawdown & Risk Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- ApexCharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
    <header>
        <h1>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #6366f1;">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            Market Wave Surface
            <span class="badge">v1.0.0</span>
        </h1>
        <div style="font-size: 0.9rem; color: var(--text-secondary);">
            Developer: <strong>alwaysprince05</strong>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Control Panel Card -->
        <section class="card control-panel">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                Simulation Settings
            </h2>
            <form id="simulation-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="input-n">Number of Days (n)</label>
                    <input type="number" id="input-n" value="500" min="50" max="2000" step="50" required>
                </div>
                <div class="form-group">
                    <label for="input-drift">Expected Return (Drift %/day)</label>
                    <input type="number" id="input-drift" value="0.05" min="-1.0" max="1.0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="input-scale">Volatility (Scale %/day)</label>
                    <input type="number" id="input-scale" value="1.00" min="0.1" max="10.0" step="0.05" required>
                </div>
                <div class="form-group">
                    <label for="input-sigma">Smoothing Sigma (Gaussian)</label>
                    <input type="number" id="input-sigma" value="3" min="0" max="15" step="1" required>
                </div>
                <div class="form-group">
                    <label for="input-seed">Random Seed</label>
                    <input type="number" id="input-seed" value="42" min="1" max="999999" required>
                </div>
                <button type="submit" class="btn" id="btn-generate">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    Re-Simulate
                </button>
            </form>
        </section>

        <!-- Charts & Statistics Panel -->
        <section style="display: flex; flex-direction: column; gap: 2rem; width: 100%;">
            <!-- Stats Summary -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Initial Value</div>
                    <div class="stat-value" id="val-initial">$100.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Final Value</div>
                    <div class="stat-value" id="val-final">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Return</div>
                    <div class="stat-value" id="val-return">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" style="color: #fda4af;">Max Drawdown</div>
                    <div class="stat-value negative" id="val-max-dd">-</div>
                </div>
            </div>

            <!-- Charts Container -->
            <div class="card charts-container">
                <!-- Top Chart: Price and Rolling Max -->
                <div class="chart-wrapper">
                    <div class="chart-title">
                        Portfolio Value & Rolling Peak
                        <div class="custom-legend">
                            <div class="legend-item">
                                <div class="legend-color legend-price"></div>
                                <span>Smooth Price</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-max"></div>
                                <span>Rolling Max</span>
                            </div>
                        </div>
                    </div>
                    <div id="price-chart"></div>
                </div>

                <!-- Bottom Chart: Drawdown -->
                <div class="chart-wrapper">
                    <div class="chart-title">
                        Drawdown Analysis (Negative %)
                        <div class="custom-legend">
                            <div class="legend-item">
                                <div class="legend-color legend-drawdown"></div>
                                <span>Drawdown</span>
                            </div>
                        </div>
                    </div>
                    <div id="drawdown-chart"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
